services:
  artisan-mobile:
    build:
      context: .
      dockerfile: infrastructure/docker/artisan-mobile.Dockerfile
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      EXPO_PUBLIC_API_BASE_URL: http://host.docker.internal:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_DOCKER_START_MODE: lan
      EXPO_HOST_IP: 10.9.7.56
      ELECTRON_DISABLE_SANDBOX: "1"
    volumes:
      - ./apps/artisan-mobile:/app/apps/artisan-mobile  # only mount source, not entire repo
      - artisan_mobile_node_modules:/app/apps/artisan-mobile/node_modules  # isolate node_modules
    working_dir: /app/apps/artisan-mobile
    command: npm run start:docker
    depends_on:
      api-gateway:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    container_name: shilpsetu-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      api-gateway:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: shilpsetu-api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://shilpsetu:shilpsetu@postgres:5432/shilpsetu
      JWT_SECRET: shilpsetu-dev-secret
      STORAGE_BUCKET: shilpsetu-local
      STORAGE_BASE_URL: http://localhost:8000/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: shilpsetu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shilpsetu
      POSTGRES_USER: shilpsetu
      POSTGRES_PASSWORD: shilpsetu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shilpsetu -d shilpsetu"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: shilpsetu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  artisan_mobile_node_modules: